<!DOCTYPE html>
<html>
<head>
  <title>Street Block Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="panel">
    <h2>Street Block Finder</h2>
    <button onclick="useMyLocation()">📍 My Location</button>
    <button onclick="toggleDark()">🌙 Night Mode</button>
    <input id="searchBox" placeholder="Search street/address in Saskatoon">
    <button onclick="searchPlace()">Search</button>
    <div id="result">Tap on any street.</div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
