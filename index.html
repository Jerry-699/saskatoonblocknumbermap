<!DOCTYPE html>
<html>
<head>
  <title>Street Block Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="panel">
    <h2>Street Block Finder</h2>

    <button onclick="useMyLocation()">📍 My Location</button>
    <button onclick="toggleDark()">🌙 Night Mode</button>
    <button onclick="startRoute()">✏️ Start Route</button>
    <button onclick="finishRoute()">✅ Finish Route</button>
    <button onclick="clearRoute()">🗑 Clear Route</button>

    <input id="searchBox" placeholder="Search street/address in Saskatoon">
    <button onclick="searchPlace()">Search</button>

    <div id="result">Tap a street to find block. Use Start Route to draw lines.</div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
